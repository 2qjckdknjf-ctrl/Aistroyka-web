# Cloudflare Workers config for Next.js via @opennextjs/cloudflare
# Do not put secrets here; use dashboard or .dev.vars (local).
# Multi-env: use --env staging | production.

account_id = "864f04d729c24f574a228558b40d7b82"

name = "aistroyka-web"
compatibility_date = "2024-12-30"
compatibility_flags = ["nodejs_compat", "global_fetch_strictly_public"]
main = ".open-next/worker.js"

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

[[services]]
binding = "WORKER_SELF_REFERENCE"
service = "aistroyka-web"

# ----------------------------------------
# [env.production] — production Worker (custom domain only)
# Required runtime vars (set in Dashboard → Worker → Settings → Variables):
#   NEXT_PUBLIC_SUPABASE_URL, NEXT_PUBLIC_SUPABASE_ANON_KEY, NEXT_PUBLIC_APP_URL
# See docs/CLOUDFLARE_WORKER_VARS.md
# ----------------------------------------
[env.production]
name = "aistroyka-web-production"
workers_dev = false
preview_urls = false

[env.production.assets]
directory = ".open-next/assets"
binding = "ASSETS"

# Routes managed in Dashboard: Workers & Pages → aistroyka-web-production → Triggers → Routes
# Add: aistroyka.ai/*, www.aistroyka.ai/*  (see docs/ROUTES_MANUAL_SETUP.md)
# [[env.production.routes]]
# pattern = "aistroyka.ai"
# zone_name = "aistroyka.ai"
# [[env.production.routes]]
# pattern = "aistroyka.ai/*"
# zone_name = "aistroyka.ai"
# [[env.production.routes]]
# pattern = "www.aistroyka.ai"
# zone_name = "aistroyka.ai"
# [[env.production.routes]]
# pattern = "www.aistroyka.ai/*"
# zone_name = "aistroyka.ai"

[[env.production.services]]
binding = "WORKER_SELF_REFERENCE"
service = "aistroyka-web-production"

# ----------------------------------------
# [env.staging] — staging Worker (workers.dev enabled)
# ----------------------------------------
[env.staging]
name = "aistroyka-web-staging"
workers_dev = true

[env.staging.assets]
directory = ".open-next/assets"
binding = "ASSETS"

[[env.staging.services]]
binding = "WORKER_SELF_REFERENCE"
service = "aistroyka-web-staging"
