# Production deploy: push to main → build (OpenNext) + deploy to Cloudflare Workers (env.production).
# Single install from repo root: bun install --frozen-lockfile. Build: bun run cf:build.
# Requires GitHub secrets: CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID.

name: Deploy Cloudflare (Production)

on:
  push:
    branches: [main]

concurrency:
  group: deploy-cloudflare-prod
  cancel-in-progress: false

jobs:
  deploy:
    name: Build and deploy to production
    runs-on: ubuntu-latest
    timeout-minutes: 25

    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      HUSKY: "0"

    steps:
      - name: Check required secrets
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "::error::CLOUDFLARE_API_TOKEN is not set. Add it in GitHub → Settings → Secrets and variables → Actions."
            exit 1
          fi
          if [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "::error::CLOUDFLARE_ACCOUNT_ID is not set. Add it in GitHub → Settings → Secrets and variables → Actions."
            exit 1
          fi
          echo "Required secrets are set."

      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: "1.2.15"

      - name: Install dependencies (workspace root)
        run: bun install --frozen-lockfile

      - name: Set build stamp and app env
        run: |
          echo "NEXT_PUBLIC_BUILD_SHA=${{ github.sha }}" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_BUILD_TIME=$(date -u +%Y-%m-%d\ %H:%M)" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_APP_ENV=production" >> $GITHUB_ENV

      - name: Build (OpenNext Cloudflare)
        run: bun run cf:build

      - name: Verify build output and app source
        working-directory: apps/web
        run: |
          echo "Build directory: $(pwd)"
          test -f .open-next/worker.js || (echo "::error::.open-next/worker.js missing" && exit 1)
          test -d .open-next/assets || (echo "::error::.open-next/assets missing" && exit 1)
          test -f "app/[locale]/(dashboard)/dashboard/page.tsx" || (echo "::error::dashboard page missing" && exit 1)
          test -f "app/[locale]/(dashboard)/layout.tsx" || (echo "::error::dashboard layout missing" && exit 1)
          echo "Worker name in wrangler (production): $(grep -A1 '^\[env.production\]' wrangler.toml | grep '^name =' | sed 's/.*= *//')"
          echo "Expected: aistroyka-web-production"

      - name: Deploy to Cloudflare (production)
        working-directory: apps/web
        run: npx wrangler deploy --env production --config wrangler.toml

      - name: Post-deploy summary
        run: |
          SHA7="$(echo ${{ github.sha }} | cut -c1-7)"
          echo "Deployed worker: aistroyka-web-production (apps/web)"
          echo "Commit SHA (full): ${{ github.sha }}"
          echo "Commit sha7: $SHA7"
          echo "workers.dev URL: In the 'Deploy to Cloudflare (production)' step above, look for: https://aistroyka-web-production.<account>.workers.dev"

      - name: Post-deploy verification (domain build marker)
        continue-on-error: true
        run: |
          SHA7="$(echo ${{ github.sha }} | cut -c1-7)"
          DOMAIN="https://aistroyka.ai"
          PASS=0
          for path in "/en/dashboard" "/dashboard"; do
            HTML=$(curl -sS -L -m 15 "$DOMAIN$path" 2>/dev/null || true)
            if echo "$HTML" | grep -q "Build:"; then
              if echo "$HTML" | grep -q "Build: $SHA7"; then
                echo "PASS: $DOMAIN$path shows Build: $SHA7"
                PASS=1
                break
              fi
            fi
          done
          if [ "$PASS" -eq 0 ]; then
            echo "FAIL: Domain did not return dashboard HTML with Build: $SHA7 (may need auth; check workers.dev or browser)"
          fi
