# Production deploy: push to main → build (OpenNext) + deploy to Cloudflare Workers (env.production).
# Requires GitHub secrets: CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID.
# See docs/CICD_FINAL_CHECKLIST.md and docs/CICD_PHASE3_WORKFLOW.md.

name: Deploy Cloudflare (Production)

on:
  push:
    branches: [main]

concurrency:
  group: deploy-cloudflare-prod
  cancel-in-progress: false

jobs:
  deploy:
    name: Build and deploy to production
    runs-on: ubuntu-latest
    timeout-minutes: 25

    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

    steps:
      - name: Check required secrets
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "::error::CLOUDFLARE_API_TOKEN is not set. Add it in GitHub → Settings → Secrets and variables → Actions."
            exit 1
          fi
          if [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "::error::CLOUDFLARE_ACCOUNT_ID is not set. Add it in GitHub → Settings → Secrets and variables → Actions."
            exit 1
          fi
          echo "Required secrets are set."

      - uses: actions/checkout@v4

      - name: Diagnostics (SHA, Node, lockfile)
        run: |
          echo "GITHUB_SHA=$GITHUB_SHA"
          git log -1 --oneline
          node -v
          npm -v
          echo "--- First lines with wrangler in package-lock.json ---"
          grep -n '"wrangler"' package-lock.json | head -5
          echo "--- Resolved wrangler version (node_modules/wrangler) ---"
          (grep -A 2 '"node_modules/wrangler"' package-lock.json | grep '"version"' || true)

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: "latest"

      - name: Verify bun
        run: bun --version

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build (OpenNext Cloudflare)
        run: npm run cf:build

      - name: Debug Cloudflare identity (temporary)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "CLOUDFLARE_ACCOUNT_ID=${CLOUDFLARE_ACCOUNT_ID}"
          echo "Wrangler version:"
          npx wrangler --version
          echo "Wrangler whoami:"
          npx wrangler whoami || true

      - name: Deploy to Cloudflare (production)
        run: npx wrangler deploy --env production
