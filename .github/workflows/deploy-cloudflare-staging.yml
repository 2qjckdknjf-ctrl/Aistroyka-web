# Staging deploy: push to develop → build (OpenNext) + deploy to Cloudflare Workers (env.staging).
# Builds apps/web. Routes are managed in Cloudflare Dashboard.
# Requires same GitHub secrets: CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID.

name: Deploy Cloudflare (Staging)

on:
  push:
    branches: [develop]

concurrency:
  group: deploy-cloudflare-staging
  cancel-in-progress: false

jobs:
  deploy:
    name: Build and deploy to staging
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: apps/web

    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

    steps:
      - name: Check required secrets
        working-directory: .
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "::error::CLOUDFLARE_API_TOKEN is not set. Add it in GitHub → Settings → Secrets and variables → Actions."
            exit 1
          fi
          if [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "::error::CLOUDFLARE_ACCOUNT_ID is not set. Add it in GitHub → Settings → Secrets and variables → Actions."
            exit 1
          fi
          echo "Required secrets are set."

      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: "latest"

      - name: Verify bun
        run: bun --version

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build (OpenNext Cloudflare)
        run: npm run cf:build

      - name: Deploy to Cloudflare (staging)
        run: npx wrangler deploy --env staging

      - name: Post-deploy summary
        run: |
          echo "Deployed worker: aistroyka-web-staging (apps/web)"
          echo "Commit: $GITHUB_SHA"
          echo "workers.dev URL: see 'Deploy to Cloudflare' step output above"
