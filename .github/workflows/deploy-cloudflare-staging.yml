# Staging deploy: push to develop → build (OpenNext) + deploy to Cloudflare Workers (env.staging).
# Builds apps/web. Routes are managed in Cloudflare Dashboard.
# Requires same GitHub secrets: CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID.

name: Deploy Cloudflare (Staging)

on:
  push:
    branches: [develop]

concurrency:
  group: deploy-cloudflare-staging
  cancel-in-progress: false

jobs:
  deploy:
    name: Build and deploy to staging
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: apps/web

    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

    steps:
      - name: Check required secrets
        working-directory: .
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "::error::CLOUDFLARE_API_TOKEN is not set. Add it in GitHub → Settings → Secrets and variables → Actions."
            exit 1
          fi
          if [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "::error::CLOUDFLARE_ACCOUNT_ID is not set. Add it in GitHub → Settings → Secrets and variables → Actions."
            exit 1
          fi
          echo "Required secrets are set."

      - uses: actions/checkout@v4

      - name: Debug repository structure
        working-directory: .
        run: |
          pwd
          ls -la
          ls -la apps || true
          ls -la apps/web || true
          ls -la apps/web/package-lock.json || true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: "latest"

      - name: Verify bun
        run: bun --version

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Set build stamp env
        working-directory: apps/web
        run: |
          echo "NEXT_PUBLIC_BUILD_SHA=${{ github.sha }}" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_BUILD_TIME=$(date -u +%Y-%m-%d\ %H:%M)" >> $GITHUB_ENV

      - name: Build (OpenNext Cloudflare)
        run: npm run cf:build

      - name: Verify build output and app source
        run: |
          echo "Build directory: $(pwd)"
          test -f .open-next/worker.js || (echo "::error::.open-next/worker.js missing" && exit 1)
          test -d .open-next/assets || (echo "::error::.open-next/assets missing" && exit 1)
          test -f "app/[locale]/(dashboard)/dashboard/page.tsx" || (echo "::error::dashboard page missing" && exit 1)
          test -f "app/[locale]/(dashboard)/layout.tsx" || (echo "::error::dashboard layout missing" && exit 1)
          echo "Worker name (staging): $(grep -A1 '^\[env.staging\]' wrangler.toml | grep '^name =' | sed 's/.*= *//')"

      - name: Deploy to Cloudflare (staging)
        run: npx wrangler deploy --env staging --config wrangler.toml

      - name: Post-deploy summary
        run: |
          SHA7="$(echo ${{ github.sha }} | cut -c1-7)"
          echo "Deployed worker: aistroyka-web-staging (apps/web)"
          echo "Commit sha7: $SHA7"
          echo "workers.dev URL: see 'Deploy to Cloudflare (staging)' step output above"
