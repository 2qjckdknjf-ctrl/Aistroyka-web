# Minimal CI: lint, test, cf:build, e2e smoke (release gates). See docs/operations/BUILD_AND_RELEASE.md.
# Single install from repo root: bun install --frozen-lockfile.

name: CI
on:
  pull_request:
    branches: [main]
  push:
    branches: ['feature/**']
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: "1.2.15"

      - name: Install dependencies (workspace root)
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Test
        run: bun run test

      - name: Build (cf:build)
        run: bun run cf:build

  e2e:
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: "1.2.15"

      - name: Install dependencies (workspace root)
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        run: cd apps/web && npx playwright install chromium --with-deps

      - name: Start dev server
        run: cd apps/web && bun run dev &
        env:
          CI: true

      - name: Wait for server
        run: |
          for i in $(seq 1 45); do
            if curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:3000 | grep -q 200; then
              echo "Server ready"
              exit 0
            fi
            sleep 2
          done
          echo "Server did not become ready"
          exit 1

      - name: Run e2e smoke
        run: cd apps/web && npm run test:e2e -- tests/e2e/cockpit-smoke.spec.ts
        env:
          CI: true
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:3000
