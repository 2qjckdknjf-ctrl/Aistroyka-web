# Minimal CI: lint, test, cf:build (canonical gates). See docs/operations/BUILD_AND_RELEASE.md.
# Single install from repo root: bun install --frozen-lockfile.

name: CI
on:
  pull_request:
    branches: [main]
  push:
    branches: ['feature/**']
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: "1.2.15"

      - name: Install dependencies (workspace root)
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Test
        run: bun run test

      - name: Build (cf:build)
        run: bun run cf:build
