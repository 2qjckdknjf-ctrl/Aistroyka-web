# Deploy to Cloudflare Workers on push to main or manual run.
# Repo secrets: CLOUDFLARE_API_TOKEN (required), CLOUDFLARE_ACCOUNT_ID (optional).

name: Deploy
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      env:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - production

env:
  NODE_VERSION: '20'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install
        run: npm ci --legacy-peer-deps

      - name: Build for Cloudflare
        run: npm run cf:build

      - name: Deploy to Cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          DEPLOY_ENV="${{ github.event.inputs.env || 'dev' }}"
          case "$DEPLOY_ENV" in
            production) npm run cf:deploy:prod ;;
            staging)    npm run cf:deploy:staging ;;
            *)          npm run cf:deploy ;;
          esac
