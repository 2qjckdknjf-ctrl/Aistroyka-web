# Deploy to Cloudflare Workers on push to main or manual run.
# Single install from repo root: bun install --frozen-lockfile.
# Repo secrets: CLOUDFLARE_API_TOKEN (required), CLOUDFLARE_ACCOUNT_ID (optional).

name: Deploy
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      env:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - production

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: "1.2.15"

      - name: Install dependencies (workspace root)
        run: bun install --frozen-lockfile

      - name: Build for Cloudflare
        run: bun run cf:build

      - name: Deploy to Cloudflare
        working-directory: apps/web
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          DEPLOY_ENV="${{ github.event.inputs.env || 'dev' }}"
          case "$DEPLOY_ENV" in
            production) bun run cf:deploy:prod ;;
            staging)    bun run cf:deploy:staging ;;
            *)          bun run cf:deploy ;;
          esac
